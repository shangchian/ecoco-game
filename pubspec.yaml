name: ecoco_app
description: "ECOCO循環經濟 APP"
publish_to: 'none'

version: 3.5.0+20260001

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.6
  firebase_core: ^4.1.1
  firebase_analytics: ^12.0.2
  firebase_crashlytics: ^5.0.2
  firebase_app_installations: ^0.4.0+4
  firebase_app_check: ^0.4.1+2
  cloud_firestore: ^6.1.2
  cloud_functions: ^6.0.6
  flutter_riverpod: ^3.0.1
  riverpod_annotation: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  auto_route: ^11.0.0
  flutter_native_splash: ^2.4.2
  dio: ^5.7.0
  dio_cache_interceptor:
  http_cache_file_store:
  path_provider:
  shared_preferences: ^2.3.3
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  biometric_storage: ^5.1.0-rc.5
  sms_autofill: ^2.4.1
  image_picker: ^1.1.2
  firebase_messaging: ^16.0.2
  loading_animation_widget: ^1.3.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.10.0
  permission_handler: ^12.0.1
  collection: ^1.19.0
  url_launcher: ^6.2.5
  package_info_plus: ^8.1.2
  timezone: ^0.10.1
  device_info_plus: ^12.1.0
  font_awesome_flutter: ^10.8.0
  flutter_siri_shortcuts: ^0.0.1
  googleapis_auth: ^2.0.0
  firebase_auth: ^6.1.0
  app_links: ^7.0.0
  flutter_markdown_plus:
  cached_network_image: ^3.4.1
  app_settings:
    git:
      url: https://github.com/spencerccf/app_settings.git
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  video_player: ^2.9.2
  lottie: ^3.2.1
  drift: ^2.30.0
  sqlite3_flutter_libs: ^0.5.41
  path:
  uuid: ^4.5.2
  screen_brightness: ^2.1.7
  visibility_detector: ^0.4.0+2
  fluttertoast: ^9.0.0
  firebase_remote_config: ^6.1.4
  new_version_plus: ^0.1.1
  app_badge_plus: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.10.4
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.1
  auto_route_generator:
  json_serializable: ^6.8.0
  freezed: ^3.2.3
  flutter_flavorizr: ^2.2.3
  drift_dev: ^2.30.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/icon/
    - assets/images/
    - assets/images/demo_logo/
    - assets/images/demo_prod/
    - assets/images/game/
    - assets/data/

  fonts:
    - family: ECOCOIcons
      fonts:
        - asset: assets/fonts/ECOCOIcons.ttf

flavorizr:
  flavors:
    mock:
      app:
        name: "ECOCO 獨享版"
      android:
        applicationId: "com.ECOCO.ECOCO.Test"
      ios:
        bundleId: "com.funleadchange.ecStore"
    internal:
      app:
        name: "ECOCO Test"
      android:
        applicationId: "com.ECOCO.ECOCO.Test"
      ios:
        bundleId: "com.funleadchange.ecStore"
    production:
      app:
        name: "ECOCO"
      android:
        applicationId: "com.ECOCO.ECOCO"
      ios:
        bundleId: "com.dream.ECOCO"